<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" fill="#05050A"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- corner brackets -->
  <g stroke="#00E5FF" stroke-width="6" fill="none" opacity="0.7">
    <path d="M48 96 V48 H96"/>
    <path d="M464 96 V48 H416"/>
    <path d="M48 416 V464 H96"/>
    <path d="M464 416 V464 H416"/>
  </g>
  <!-- diamond core -->
  <g filter="url(#glow)">
    <polygon points="256,128 384,256 256,384 128,256" stroke="url(#g)" stroke-width="10" fill="rgba(0,229,255,0.15)"/>
    <polygon points="256,180 332,256 256,332 180,256" stroke="#00E5FF" stroke-width="4" fill="none"/>
    <circle cx="256" cy="256" r="14" fill="#00E5FF"/>
  </g>
  <!-- text -->
  <text x="256" y="448" text-anchor="middle" fill="#00E5FF" font-family="monospace" font-size="36" font-weight="900" letter-spacing="8">SYSTEM</text>
</svg>
